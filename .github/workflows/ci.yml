name: CI pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --exclude-paths=.trufflehog-exclude --only-verified

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: 'pom.xml'

      - name: Build, Test and Scan
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.PER_GITHUB_TOKEN }}
        run: |
          mvn clean verify -s settings-docker.xml checkstyle:check spotbugs:check jacoco:check -Djacoco.line.ratio=0.70

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.event.repository.name }}
          path: |
            target/site/jacoco/
            target/spotbugsXml.xml