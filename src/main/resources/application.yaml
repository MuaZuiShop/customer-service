spring:
  application:
    name: customer-service
  config:
    import:
      - optional:file:.env[.properties]
      - 'classpath:web.yml'
      - 'classpath:eureka.yml'
      - 'classpath:database.yml'

jwt:
  secret: ${JWT_SECRET:defaultDevSecretKeyThatIsLongEnough_please_replace}
  access-exp: ${ACCESS_EXP:900000}
  refresh-exp: ${REFRESH_EXP:604800000}